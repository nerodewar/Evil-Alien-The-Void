<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05070a">
  <meta
    name="description"
    content="The Void: a cinematic choose-your-own-adventure prologue."
  >
  <title>The Void — Prologue</title>

  <link rel="preload" as="image" href="assets/IMG01.png">
  <link rel="preload" as="image" href="assets/IMG02.png">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="starfield" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <main class="cinematic-shell" id="cinematicShell">
    <section
      class="cinematic-frame"
      id="cinematicFrame"
      aria-label="The Void cinematic prologue"
    >
      <div class="image-panel" id="imagePanel">
        <img
          id="sceneImage"
          class="scene-image"
          src="assets/IMG01.png"
          alt="Elite Forces Agent Luna H. asleep inside a softly glowing cryosleep chamber."
        >

        <div class="image-vignette" aria-hidden="true"></div>

        <div class="image-caption" aria-hidden="true">
          <span id="imageCode">CRYOSLEEP UNIT 03</span>
          <span id="missionTime">T−72:00:00</span>
        </div>
      </div>

      <article class="story-panel" id="storyPanel">
        <header class="story-header">
          <div>
            <p class="eyebrow">ELITE FORCES // MISSION ARCHIVE</p>
            <h1>THE VOID</h1>
          </div>
          <p class="scene-counter" id="sceneCounter">01 / 02</p>
        </header>

        <div class="divider" aria-hidden="true">
          <span></span>
        </div>

        <section class="narrative-wrap">
          <p class="log-label" id="logLabel">MISSION LOG // LUNA H.</p>

          <p
            class="narrative"
            id="narrative"
            aria-live="off"
            aria-atomic="true"
          ></p>

          <span class="type-cursor" id="typeCursor" aria-hidden="true"></span>
        </section>

        <footer class="story-footer">
          <p class="keyboard-hint" id="keyboardHint">
            ENTER TO COMPLETE TRANSMISSION
          </p>

          <button
            class="continue-button"
            id="continueButton"
            type="button"
            disabled
            aria-disabled="true"
          >
            <span class="button-index">01</span>
            <span class="button-label">CONTINUE</span>
            <span class="button-arrow" aria-hidden="true">›</span>
          </button>
        </footer>
      </article>
    </section>
  </main>

  <div class="final-blackout" id="finalBlackout" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
